<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика | CloudNotes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-wrapper">
    <aside class="sidebar">
        <div class="sidebar-logo">CloudNotes</div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('admin') }}" class="sidebar-link">Заметки</a>
            <a href="{{ url_for('manage_categories') }}" class="sidebar-link">Категории</a>
            <a href="{{ url_for('stats') }}" class="sidebar-link active">Статистика</a>
            <a href="{{ url_for('manage_users') }}" class="sidebar-link">Доступ</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <span class="username-tag">{{ current_user.username }}</span>
                <a href="{{ url_for('logout') }}" class="logout-link">Выход</a>
            </div>
            <a href="{{ url_for('index') }}" class="nav-link" style="display: block; margin-top: 1rem;">← На главную</a>
        </div>
    </aside>

    <main class="admin-content">
        <header>
            <h1>Статистика категорий</h1>
        </header>

        <section class="glass-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Категория</th>
                        <th>Количество заметок</th>
                    </tr>
                </thead>
                <tbody>
                    {% for stat in stats %}
                    <tr>
                        <td>
                            <span class="category-pill">{{ stat['name'] }}</span>
                        </td>
                        <td>{{ stat['count'] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% if not stats %}
                <p style="text-align: center; color: var(--text-secondary); opacity: 0.5; padding: 2rem;">Категорий пока нет.</p>
            {% endif %}
        </section>
    </main>
</body>
</html>
