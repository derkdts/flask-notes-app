<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudNotes | Flask Edition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>CloudNotes</h1>
            <p style="color: var(--text-secondary)">Ваше личное хранилище заметок (Flask)</p>
        </header>

        <section class="glass-card">
            <form action="{{ url_for('add_note') }}" method="POST">
                <div class="form-group">
                    <label for="title">Заголовок</label>
                    <input type="text" name="title" id="title" placeholder="Введите название..." required>
                </div>
                <div class="form-group">
                    <label for="content">Содержание</label>
                    <textarea name="content" id="content" rows="4" placeholder="Ваши мысли..." required></textarea>
                </div>
                <button type="submit">Сохранить заметку</button>
            </form>
        </section>

        <div class="notes-grid">
            {% for note in notes %}
                <div class="glass-card note-card">
                    <div class="note-header">
                        <h3 class="note-title">{{ note['title'] }}</h3>
                    </div>
                    <div class="note-content">{{ note['content'] }}</div>
                    <div class="note-footer">
                        <span>{{ note['created_at'] }}</span>
                        <a href="{{ url_for('delete_note', note_id=note['id']) }}" class="delete-btn" onclick="return confirm('Вы уверены?')">Удалить</a>
                    </div>
                </div>
            {% endfor %}
            
            {% if not notes %}
                <p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); opacity: 0.5;">Заметок пока нет...</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
