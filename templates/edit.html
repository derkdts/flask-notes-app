<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать заметку | CloudNotes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="app-wrapper">
    <main class="main-content" style="margin-left: 0; max-width: 600px; margin-right: auto; margin-left: auto;">
        <header style="text-align: left; margin-bottom: 2rem;">
            <h1>Редактирование заметки</h1>
            <a href="{{ url_for('admin') }}" class="nav-link">← Отмена</a>
        </header>

        <section class="glass-card">
            <form action="{{ url_for('edit_note', note_id=note['id']) }}" method="POST">
                <div class="form-group">
                    <label for="title">Заголовок</label>
                    <input type="text" name="title" id="title" value="{{ note['title'] }}" required>
                </div>
                <div class="form-group">
                    <label for="content">Содержание</label>
                    <textarea name="content" id="content" rows="6" required>{{ note['content'] }}</textarea>
                </div>
                <div class="form-group">
                    <label for="category_ids">Категории (удерживайте Ctrl для выбора нескольких)</label>
                    <select name="category_ids" id="category_ids" multiple>
                        {% for cat in all_categories %}
                            <option value="{{ cat['id'] }}" {% if cat['id'] in note['category_ids'] %}selected{% endif %}>{{ cat['name'] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="new_category">Добавить новую категорию</label>
                    <input type="text" name="new_category" id="new_category" placeholder="Название новой категории...">
                </div>
                <div class="form-actions">
                    <button type="submit">Сохранить</button>
                    <a href="{{ url_for('admin') }}" class="cancel-btn">Отмена</a>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
